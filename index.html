<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230a0a0e' rx='12'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-family='Courier New, monospace' font-weight='800' font-size='38' fill='%23ff8c42'%3ERP%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>
    <div id="bgWords"></div>
    <div class="main">
        <div class="frame">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
            <div class="logo">
                <span class="accent">R</span><span class="rest">EGENT'S</span>
                <span class="rest"> </span>
                <span class="accent">V</span><span class="rest">OICE</span>
            </div>
            <div class="player-box">
                <div class="player-row">
                    <div class="cover-art-wrap">
                        <div id="coverContainer" class="cover-container">
                            <img id="coverArt" class="cover-image" src="" alt="cover" />
                            <svg id="coverPlaceholder" class="cover-placeholder" viewBox="0 0 24 24">
                                <use href="#music-note" />
                            </svg>
                        </div>
                    </div>
                    <div class="visualizer-wrap">
                        <canvas id="visualizer"></canvas>
                    </div>
                </div>
                <div class="track-name" id="trackTitle">DROP AUDIO FILE</div>
                <div class="progress-wrap">
                    <span class="time" id="currentTime">00:00</span>
                    <input type="range" id="progressBar" class="progress-bar" value="0" step="0.1" />
                    <span class="time" id="durationTime">00:00</span>
                </div>
                <div class="controls">
                    <button class="ctrl-btn" id="shuffleBtn" title="Shuffle">
                        <svg id="shuffleIcon"><use href="#shuffle-off" /></svg>
                    </button>
                    <button class="ctrl-btn" id="prevBtn" title="Previous">
                        <svg><use href="#prev" /></svg>
                    </button>
                    <button class="ctrl-btn" id="rewindBtn" title="-10s">
                        <svg><use href="#rewind" /></svg>
                    </button>
                    <button class="ctrl-btn" id="playBtn" title="Play/Pause">
                        <svg id="playIcon"><use href="#play" /></svg>
                    </button>
                    <button class="ctrl-btn" id="forwardBtn" title="+10s">
                        <svg><use href="#forward" /></svg>
                    </button>
                    <button class="ctrl-btn" id="nextBtn" title="Next">
                        <svg><use href="#next" /></svg>
                    </button>
                    <button class="ctrl-btn" id="loopBtn" title="Loop">
                        <svg id="loopIcon"><use href="#loop-off" /></svg>
                    </button>
                    <div class="extra-controls">
                        <div class="load-wrapper">
                            <button class="ctrl-btn" id="loadBtn" title="Load">
                                <svg><use href="#folder" /></svg>
                            </button>
                            <div id="loadMenu" class="load-menu">
                                <div class="load-menu-item" data-action="files">Load Files</div>
                                <div class="load-menu-item" data-action="folder">Load Folder</div>
                            </div>
                        </div>
                        <div class="volume-wrap">
                            <input type="range" id="volumeBar" class="volume-bar" min="0" max="1" step="0.01" value="0.8" />
                        </div>
                    </div>
                </div>
                <div class="playlist" id="playlistContainer"></div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container">
            <div class="modal-header">
                <span class="modal-title">PLAYLIST</span>
                <button class="modal-close" id="modalCloseBtn">✕</button>
            </div>
            <div class="modal-playlist" id="modalPlaylistContainer"></div>
        </div>
    </div>
    <input type="file" id="fileInput" accept="audio/*,video/mp4,.mp4,.m4a" multiple hidden />
    <input type="file" id="folderInput" webkitdirectory hidden />
    <svg style="display:none;" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <symbol id="shuffle-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 8h12" /><polyline points="16,6 18,8 16,10" /><path d="M4 16h12" /><polyline points="16,14 18,16 16,18" />
            </symbol>
            <symbol id="shuffle-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 8h12" /><polyline points="16,6 18,8 16,10" /><path d="M20 16H8" /><polyline points="8,14 6,16 8,18" />
            </symbol>
            <symbol id="prev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="19,20 9,12 19,4" /><rect x="5" y="4" width="2" height="16" />
            </symbol>
            <symbol id="rewind" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11,4 3,12 11,20" /><polygon points="19,4 11,12 19,20" />
            </symbol>
            <symbol id="play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5,3 19,12 5,21" />
            </symbol>
            <symbol id="pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />
            </symbol>
            <symbol id="forward" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13,4 21,12 13,20" /><polygon points="5,4 13,12 5,20" />
            </symbol>
            <symbol id="next" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="5,4 15,12 5,20" /><rect x="17" y="4" width="2" height="16" />
            </symbol>
            <symbol id="loop-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 2l4 4-4 4" /><path d="M3 11v-1a4 4 0 0 1 4-4h14" /><path d="M7 22l-4-4 4-4" /><path d="M21 13v1a4 4 0 0 1-4 4H3" /><line x1="3" y1="3" x2="21" y2="21" />
            </symbol>
            <symbol id="loop-one" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 2l4 4-4 4" /><path d="M3 11v-1a4 4 0 0 1 4-4h14" /><path d="M7 22l-4-4 4-4" /><path d="M21 13v1a4 4 0 0 1-4 4H3" /><text x="12" y="16" font-size="10" text-anchor="middle" fill="currentColor" stroke="none" font-weight="bold">1</text>
            </symbol>
            <symbol id="loop-all" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 2l4 4-4 4" /><path d="M3 11v-1a4 4 0 0 1 4-4h14" /><path d="M7 22l-4-4 4-4" /><path d="M21 13v1a4 4 0 0 1-4 4H3" />
            </symbol>
            <symbol id="folder" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z" />
            </symbol>
            <symbol id="music-note" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" />
            </symbol>
        </defs>
    </svg>
    <script src="words.js"></script>
    <script src="bgWords.js"></script>
    <script src="script.js"></script>
</body>
</html>
